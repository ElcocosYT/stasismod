name: Publish Stasis Paradox 1.21.1

on:
  push:
    tags:
      - 'v*-1.21.1'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Read release metadata
        id: release_meta
        shell: bash
        run: |
          MOD_VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2-)"
          if [ -z "${MOD_VERSION}" ]; then
            echo "Could not read mod_version from gradle.properties" >&2
            exit 1
          fi

          {
            echo "mod_version=${MOD_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build
        run: ./gradlew build --no-daemon --console=plain

      - name: Read tag changelog
        id: tag_changelog
        shell: bash
        run: |
          git fetch --force --tags origin

          TAG_CHANGELOG="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')"
          if [ -z "${TAG_CHANGELOG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} is missing a changelog body." >&2
            exit 1
          fi

          {
            echo 'changelog<<EOF'
            echo "${TAG_CHANGELOG}"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: Publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: jisLagDi
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 1509815
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          version: ${{ steps.release_meta.outputs.mod_version }}
          version-type: release
          name: ""
          modrinth-name: Stasis Paradox ${{ steps.release_meta.outputs.mod_version }}
          changelog: ${{ steps.tag_changelog.outputs.changelog }}
          loaders: |
            fabric
          game-versions: |
            1.21.1
          java: |
            21
          files: |
            build/libs/!(*-@(dev|sources|javadoc)).jar

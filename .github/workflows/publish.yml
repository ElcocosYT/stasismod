name: Publish Stasis Paradox 1.21.11

on:
  push:
    tags:
      - 'v*-1.21.11'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Read release metadata
        id: release_meta
        shell: bash
        run: |
          MOD_VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2-)"
          if [ -z "${MOD_VERSION}" ]; then
            echo "Could not read mod_version from gradle.properties" >&2
            exit 1
          fi

          {
            echo "mod_version=${MOD_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build
        run: ./gradlew build --no-daemon --console=plain

      - name: Read tag changelog
        id: tag_changelog
        shell: bash
        run: |
          git fetch --force --tags origin

          TAG_CHANGELOG="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')"
          if [ -z "${TAG_CHANGELOG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} is missing a changelog body." >&2
            exit 1
          fi

          {
            echo 'changelog<<EOF'
            echo "${TAG_CHANGELOG}"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: Publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: jisLagDi
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          version: ${{ steps.release_meta.outputs.mod_version }}
          version-type: release
          name: ""
          modrinth-name: Stasis Paradox ${{ steps.release_meta.outputs.mod_version }}
          changelog: ${{ steps.tag_changelog.outputs.changelog }}
          loaders: |
            fabric
          game-versions: |
            1.21.11
          java: |
            21
          files: |
            build/libs/!(*-@(dev|sources|javadoc)).jar

      - name: Resolve CurseForge metadata
        id: curseforge_meta
        shell: bash
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_MINECRAFT_VERSION: 1.21.11
          CURSEFORGE_JAVA_VERSION: Java 21
        run: |
          FILE_PATH="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*-dev.jar' | head -n 1)"
          if [ -z "${FILE_PATH}" ]; then
            echo "Could not find the primary jar in build/libs" >&2
            exit 1
          fi

          export FILE_PATH
          export GAME_VERSIONS_JSON="$(curl -fsSL -H "X-Api-Token: ${CURSEFORGE_TOKEN}" https://www.curseforge.com/api/game/versions)"

          python - <<'PY'
          import json
          import os
          import sys

          raw = json.loads(os.environ["GAME_VERSIONS_JSON"])
          versions = raw.get("data", []) if isinstance(raw, dict) else raw
          wanted = [
              os.environ["CURSEFORGE_MINECRAFT_VERSION"],
              "Fabric",
              os.environ["CURSEFORGE_JAVA_VERSION"],
              "Client",
              "Server",
          ]

          resolved_ids = []
          missing = []
          for name in wanted:
              match = next((str(version.get("id")) for version in versions if str(version.get("name", "")) == name), None)
              if match is None:
                  missing.append(name)
              else:
                  resolved_ids.append(match)

          if missing:
              print("Missing CurseForge game version entries: " + ", ".join(missing), file=sys.stderr)
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"file_path={os.environ['FILE_PATH']}\n")
              output.write(f"game_version_ids={','.join(resolved_ids)}\n")
          PY

      - name: Publish to CurseForge
        shell: bash
        env:
          CURSEFORGE_PROJECT_ID: 1509815
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CHANGELOG: ${{ steps.tag_changelog.outputs.changelog }}
          FILE_PATH: ${{ steps.curseforge_meta.outputs.file_path }}
          GAME_VERSION_IDS: ${{ steps.curseforge_meta.outputs.game_version_ids }}
        run: |
          python - <<'PY'
          import json
          import os

          metadata = {
              "changelog": os.environ["CHANGELOG"],
              "changelogType": "markdown",
              "gameVersions": [int(value) for value in os.environ["GAME_VERSION_IDS"].split(",") if value],
              "releaseType": "release",
          }

          with open("curseforge-metadata.json", "w", encoding="utf-8") as metadata_file:
              json.dump(metadata, metadata_file, ensure_ascii=False)
          PY

          for attempt in 1 2 3; do
            if curl -fsSL \
              -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
              -F "metadata=<curseforge-metadata.json;type=application/json" \
              -F "file=@${FILE_PATH}" \
              "https://www.curseforge.com/api/projects/${CURSEFORGE_PROJECT_ID}/upload-file"; then
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "CurseForge upload failed after ${attempt} attempts." >&2
              exit 1
            fi

            sleep 10
          done
